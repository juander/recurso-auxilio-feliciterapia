<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Ferramenta de apoio a um recurso terapêutico do projeto Feliciterapia — exercício de atenção com setas.">
  <meta name="theme-color" content="#FDF9F8">
  <title>Feliciterapia — Brincadeira das Setas</title>
  <link rel="icon" type="image/png" sizes="64x64" href="assets/favicon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ===================== TELA DE INÍCIO (FAIXADA) ===================== -->
  <main id="tela-inicio" class="tela tela--inicio" aria-label="Tela inicial">
    <div class="faixada">
      <picture>
        <source srcset="assets/logo-feliciterapia.webp" type="image/webp">
        <img class="faixada__logo" src="assets/logo-feliciterapia.png"
             alt="Logotipo Feliciterapia: um nariz de palhaço vermelho e um sorriso azul" width="634" height="743">
      </picture>
    </div>

    <form id="form-inicio" class="painel" novalidate>
      <div class="campo">
        <label class="campo__label" for="segundos">Segundos entre cada seta</label>
        <div class="campo__controle">
          <button type="button" class="passo" id="btn-menos" aria-label="Diminuir segundos">−</button>
          <input class="campo__input" type="number" id="segundos" name="segundos"
                 inputmode="numeric" min="1" max="10" step="1" value="3"
                 aria-describedby="ajuda-segundos">
          <button type="button" class="passo" id="btn-mais" aria-label="Aumentar segundos">+</button>
        </div>
        <p class="campo__ajuda" id="ajuda-segundos">Tempo que a seta fica escondida. Padrão: 3 segundos.</p>
      </div>

      <button type="submit" class="botao-iniciar" id="btn-iniciar">Iniciar brincadeira</button>
    </form>
  </main>

  <!-- ===================== TELA DE FOCO (O JOGO) ===================== -->
  <section id="tela-foco" class="tela tela--foco" aria-label="Brincadeira em andamento" hidden>
    <div class="contagem contagem--oculta" id="contagem" role="status" aria-live="assertive" aria-label="Preparando"></div>

    <div class="seta" id="seta" role="img" aria-live="polite" aria-label="Seta">
      <!-- seta grande apontando para a DIREITA por padrão; JS inverte com scaleX(-1) -->
      <svg viewBox="0 0 100 100" width="100%" height="100%" aria-hidden="true" focusable="false">
        <path d="M8 38 H58 V20 L92 50 L58 80 V62 H8 Z"
              fill="currentColor" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
      </svg>
    </div>

    <button type="button" class="botao-parar" id="btn-parar" aria-label="Parar brincadeira e voltar ao início">
      parar
    </button>
  </section>

  <script src="app.js"></script>
</body>
</html>
